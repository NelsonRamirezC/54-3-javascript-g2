<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>

        //prompt permite capturar datos ingresados por el usuario
        let nombre = prompt("Ingresa tu nombre:");
        let apellido = prompt("Ingresa tu apellido:");

        let nombreCompleto = `${nombre} ${apellido}`;

        let saludo = `Gracias ${nombreCompleto} por visitarnos.`;
        
        alert(saludo);

        console.log(saludo);

    </script>
</head>
<body>
    <h1>Utilanzado alert, prompt y console</h1>
</body>
</html>
