<script>
    //SOLICITAR AL USUARIO INGRESAR EL DIAMETRO DE UN CIRCULO Y OBTENER EL ÁREA
    //UTILIZAR PROMPT Y ALERT
    //HASTA LAS 12:32 HRS.

    //DESARROLLAR EJERCICIO...

    let diametro = prompt("Ingrese el diametro de un circulo(cm): ");
    diametro = Number(diametro);

    let radio = diametro / 2;
    let area = 3.1416 * (radio ** 2);

    alert(`El area del circulo es: ${area.toFixed(2)} cms²`);

</script>
