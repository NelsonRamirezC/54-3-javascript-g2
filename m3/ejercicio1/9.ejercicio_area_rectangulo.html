<script>
    //SOLICITAR AL USUARIO LOS DATOS NECESARIOS PARA CALCULAR EL ÁREA DE UN RECTANGULO

    //HASTA LAS 12:42 HRS

    let base = Number(prompt("Ingrese la base del rectangulo en cms:"));
    let altura = Number(prompt("Ingrese la altura del rectangulo en cms:"));

    let area = base * altura;

    alert("El área del rectangulo es: " + area.toFixed(2) + " centímetros cuadrados");

</script>
