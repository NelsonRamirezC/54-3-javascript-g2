<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar dinero</title>

    <!-- CSS BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- JS BOOTSTRAP -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link active" aria-current="page" href="./sendmoney.html">Enviar dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link" href="./login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5 container">
        <h1 class="text-center text-primary text-capitalize">Enviar dinero</h1>
    </header>

    <main class="container">

        <section>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <h2>Balance cuenta: $ <span>60.000</span> </h2>
                    <form>
                        <div class="mb-3">
                            <label for="contacto" class="form-label">Buscar en la agenda de transferencias:</label>
                            <input type="text" class="form-control" name="contacto" id="contacto">
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Agregar nuevo contacto</button>
                        </div>

                        <div class="mb-3">
                            <h2>Contactos</h2>
                            <ul id="contactList" class="list-group">
                                <li class="list-group-item">
                                    <div class="contact-info">
                                        <span class="contact-name">John Doe</span>
                                        <span class="contact-details">CBU: 123456789, Alias: john.doe, Banco: ABC
                                            Bank</span>
                                    </div>
                                </li>
                                <li class="list-group-item">
                                    <div class="contact-info">
                                        <span class="contact-name">Jane Smith</span>
                                        <span class="contact-details">CBU: 987654321, Alias: jane.smith, Banco: XYZ
                                            Bank</span>
                                    </div>
                                </li>
                            </ul>
                        </div>
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto:</label>
                            <input type="number" class="form-control" name="monto" id="monto" min="500">
                            <div id="montoHelp" class="form-text">El monto debe ser igual o superior a $500.-</div>
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Enviar dinero</button>
                        </div>

                    </form>

                </div>
            </div>

        </section>

    </main>

</body>

</html>
